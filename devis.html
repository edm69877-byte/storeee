<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demander mon devis - DigitalFR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0F;
            --bg-card: #14141F;
            --primary: #6C63FF;
            --white: #FFFFFF;
            --gray: #A0A0AB;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--white); font-family: 'Inter', sans-serif; line-height: 1.6; padding-bottom: 50px; }
        h1, h2, .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        header { padding: 30px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; }
        .logo span { color: var(--primary); }
        .back-link { color: var(--gray); text-decoration: none; font-size: 0.9rem; transition: var(--transition); }
        .back-link:hover { color: var(--white); }

        .form-header { text-align: center; margin: 40px 0 60px; }
        .form-header h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #FFF 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-header p { color: var(--gray); font-size: 1.1rem; }

        .form-card { background: var(--bg-card); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--gray); }
        
        input, select, textarea {
            width: 100%; padding: 15px; background: #0A0A0F; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; font-family: 'Inter'; font-size: 1rem; transition: var(--transition);
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(108, 99, 255, 0.2); }

        .radio-group { display: flex; gap: 20px; margin-top: 10px; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-item input { width: auto; }

        .btn-submit {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: var(--transition); margin-top: 20px;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108, 99, 255, 0.5); }

        #confirmation {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            max-width: 400px; width: 90%;
        }
        #confirmation h2 { color: var(--primary); margin-bottom: 15px; }
        #confirmation p { margin-bottom: 25px; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header>
            <div class="logo">Digital<span>FR</span>⚡</div>
            <a href="index.html" class="back-link">← Retour au site</a>
        </header>

        <div class="form-header">
            <h1>Demandez votre devis gratuit</h1>
            <p>Répondez à ces quelques questions, nous vous recontactons sous 24h.</p>
        </div>

        <div class="form-card">
            <form id="devisForm">
                <div class="form-group">
                    <label>Prénom et Nom</label>
                    <input type="text" id="nom" placeholder="Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label>Nom de votre boutique</label>
                    <input type="text" id="boutique" placeholder="L'Artisan Boulanger" required>
                </div>
                <div class="form-group">
                    <label>Votre secteur</label>
                    <select id="secteur" required>
                        <option value="" disabled selected>Choisir un secteur</option>
                        <option value="Fleuriste">Fleuriste</option>
                        <option value="Boulanger">Boulanger</option>
                        <option value="Coiffeur">Coiffeur</option>
                        <option value="Serrurier">Serrurier</option>
                        <option value="Hôtel ou B&B">Hôtel ou B&B</option>
                        <option value="Restaurant">Restaurant</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Votre ville</label>
                    <input type="text" id="ville" placeholder="Paris, Lyon..." required>
                </div>
                <div class="form-group">
                    <label>Numéro de téléphone</label>
                    <input type="tel" id="tel" placeholder="06 00 00 00 00" required>
                </div>
                <div class="form-group">
                    <label>Formule souhaitée</label>
                    <select id="formule" required>
                        <option value="Starter 30€/mois">Starter 30€/mois</option>
                        <option value="Pro 49€/mois" selected>Pro 49€/mois (Populaire)</option>
                        <option value="Premium 60€/mois">Premium 60€/mois</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Avez-vous déjà un site ?</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="dejaSite" value="Oui"> Oui</label>
                        <label class="radio-item"><input type="radio" name="dejaSite" value="Non" checked> Non</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Décrivez votre boutique en quelques mots</label>
                    <textarea id="message" rows="4" placeholder="Ex: Boutique familiale ouverte depuis 10 ans..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer ma demande 🚀</button>
            </form>
        </div>
    </div>

    <div id="confirmation">
        <h2>✨ Presque fini !</h2>
        <p>Votre demande a été préparée ! Il ne vous reste plus qu'à <strong>envoyer le mail</strong> qui vient de s'ouvrir.</p>
        <button class="btn-submit" onclick="location.reload()">OK</button>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2; this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width; if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height; }
            draw() { ctx.fillStyle = 'rgba(108, 99, 255, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function createParticles() { particles = []; for (let i = 0; i < 50; i++) { particles.push(new Particle()); } }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', initCanvas);
        initCanvas(); createParticles(); animate();

        document.getElementById('devisForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const boutique = document.getElementById('boutique').value;
            const secteur = document.getElementById('secteur').value;
            const ville = document.getElementById('ville').value;
            const tel = document.getElementById('tel').value;
            const formule = document.getElementById('formule').value;
            const dejaSite = document.querySelector('input[name="dejaSite"]:checked').value;
            const message = document.getElementById('message').value;

            const mailBody = `Demande de devis DigitalFR\n\n` +
                             `Client : ${nom}\n` +
                             `Boutique : ${boutique}\n` +
                             `Secteur : ${secteur}\n` +
                             `Ville : ${ville}\n` +
                             `Téléphone : ${tel}\n` +
                             `Formule : ${formule}\n` +
                             `Déjà un site : ${dejaSite}\n\n` +
                             `Message :\n${message}`;

            const subject = `Demande de devis DigitalFR — ${boutique}`;
            const mailtoLink = `mailto:adryen.digital@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(mailBody)}`;
            
            window.location.href = mailtoLink;
            document.getElementById('confirmation').style.display = 'block';
        });
    </script>
</body>
</html>
